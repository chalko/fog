services:
  omni-infra-provider-proxmox:
    image: ghcr.io/siderolabs/omni-infra-provider-proxmox:latest
    container_name: omni-infra-provider-proxmox
    restart: unless-stopped
    volumes:
      # Mount the configuration auto-generated in memory by load-env.sh
      - /dev/shm/fog/omni-config.yaml:/config.yaml:ro
    environment:
      - OMNI_API_ENDPOINT=${OMNI_API_ENDPOINT}
      - OMNI_SERVICE_ACCOUNT_KEY=${OMNI_SERVICE_ACCOUNT_KEY}
    command:
      - --config-file
      - /config.yaml
      - --omni-api-endpoint
      - ${OMNI_API_ENDPOINT}
      - --omni-service-account-key
      - ${OMNI_SERVICE_ACCOUNT_KEY}
