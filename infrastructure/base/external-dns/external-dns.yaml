apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 10m
  chart:
    spec:
      chart: external-dns
      sourceRef:
        kind: HelmRepository
        name: external-dns
  values:
    provider: pihole
    env:
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        value: "http://10.5.110.3"
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: pihole-secrets
            key: password
    domainFilters:
      - "fog.chalko.com"
    policy: upsert-only
    registry: noop
    txtOwnerId: "lodge-k8s-cluster"
    extraArgs:
      - --pihole-api-version=6
