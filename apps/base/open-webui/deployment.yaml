apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Local Ollama Connection
            - name: OLLAMA_BASE_URL
              value: "http://ollama.ollama.svc.cluster.local:11434"
            
            # LiteLLM & Hermes Agent Connections
            - name: LITELLM_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: litellm-master-key
            - name: OPENAI_API_BASE_URLS
              value: "http://litellm.litellm.svc.cluster.local:4000/v1;http://hermes-hermes-agent.hermes.svc.cluster.local:80/v1"
            - name: OPENAI_API_KEYS
              value: "$(LITELLM_KEY);$(LITELLM_KEY)"

            # Google OAuth2 Authentication
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: google-client-secret
            - name: REDIRECT_URI
              value: "https://chat.fog.chalko.com/oauth/google/callback"

            # General settings
            - name: WEBUI_NAME
              value: "Chalko AI Chat"
            - name: WEBUI_AUTH
              value: "true"
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-pvc
  namespace: open-webui
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "local-path"
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
spec:
  selector:
    app: open-webui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: open-webui
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: chat.fog.chalko.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 80
  tls:
    - hosts:
        - chat.fog.chalko.com
      secretName: open-webui-tls
