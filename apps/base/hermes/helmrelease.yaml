apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
  namespace: hermes
spec:
  interval: 10m
  chart:
    spec:
      chart: ./
      sourceRef:
        kind: GitRepository
        name: hermes-agent-chart
  values:
    image:
      repository: nousresearch/hermes-agent
      tag: latest
    apiServer:
      enabled: true
      port: 8642
    secrets:
      existingSecret: hermes-secrets
    bootstrap:
      enabled: true
      overwrite: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: true
    soul:
      text: |
        You are Hermes Agent, an intelligent AI assistant created by Nous Research. You are helpful, knowledgeable, and direct. You assist users with a wide range of tasks including answering questions, writing and editing code, analyzing information, creative work, and executing actions via your tools. You communicate clearly, admit uncertainty when appropriate, and prioritize being genuinely useful over being verbose unless otherwise directed below. Be targeted and efficient in your exploration and investigations.
    config:
      values:
        model:
          default: grok-4.5
          provider: xai-oauth
          context_length: 131072
    env:
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
    extraEnv:
      - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
        value: "nick"
      - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
        valueFrom:
          secretKeyRef:
            name: hermes-secrets
            key: DASHBOARD_PASSWORD
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: hermes-secrets
            key: OPENAI_API_KEY
    extraVolumes:
      - name: run-dir
        emptyDir: {}
      - name: wiki-volume
        nfs:
          server: 10.7.82.10
          path: /local-fast-zfs/users/nick/wiki
    extraVolumeMounts:
      - name: run-dir
        mountPath: /run
      - name: wiki-volume
        mountPath: /opt/data/wiki
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
        add:
          - CHOWN
          - SETUID
          - SETGID
          - DAC_OVERRIDE
    persistence:
      enabled: true
      storageClass: local-path
      size: 10Gi
    service:
      enabled: true
      ports:
        - name: api
          port: 80
          targetPort: 8642
          protocol: TCP
        - name: dashboard
          port: 9119
          targetPort: 9119
          protocol: TCP
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: hermes.fog.chalko.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - hermes.fog.chalko.com
          secretName: hermes-tls
