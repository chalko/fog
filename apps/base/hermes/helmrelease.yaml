apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
  namespace: hermes
spec:
  interval: 10m
  chart:
    spec:
      chart: ./
      sourceRef:
        kind: GitRepository
        name: hermes-agent-chart
  values:
    image:
      repository: nousresearch/hermes-agent
      tag: latest
    apiServer:
      enabled: true
      port: 8642
    secrets:
      existingSecret: hermes-secrets
    bootstrap:
      enabled: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: true
    extraVolumes:
      - name: run-dir
        emptyDir: {}
    extraVolumeMounts:
      - name: run-dir
        mountPath: /run
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      capabilities:
        drop: []
        add:
          - CHOWN
          - SETUID
          - SETGID
          - DAC_OVERRIDE
    persistence:
      enabled: true
      storageClass: local-path
      size: 10Gi
    service:
      enabled: true
      ports:
        - name: api
          port: 80
          targetPort: 8642
          protocol: TCP
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: hermes.fog.chalko.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - hermes.fog.chalko.com
          secretName: hermes-tls
    extraEnv:
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: hermes-secrets
            key: openai-api-key
      - name: OPENAI_BASE_URL
        value: "http://litellm.litellm.svc.cluster.local:4000/v1"
