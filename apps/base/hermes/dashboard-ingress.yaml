apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-dashboard
  namespace: hermes
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: hermes-dashboard.fog.chalko.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-hermes-agent
                port:
                  name: dashboard
  tls:
    - hosts:
        - hermes-dashboard.fog.chalko.com
      secretName: hermes-dashboard-tls
