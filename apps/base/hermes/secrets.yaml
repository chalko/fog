apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-secrets
  namespace: hermes
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: hermes-secrets
    creationPolicy: Owner
  data:
    - secretKey: openai-api-key
      remoteRef:
        key: secret/data/app/litellm
        property: master_key
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: secret/data/app/litellm
        property: master_key
