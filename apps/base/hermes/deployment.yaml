apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: ghcr.io/nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8642
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: openai-api-key
            - name: OPENAI_BASE_URL
              value: "http://litellm.litellm.svc.cluster.local:4000/v1"
          volumeMounts:
            - name: hermes-data
              mountPath: /home/node/.hermes
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-pvc
  namespace: hermes
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "local-path"
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes
spec:
  selector:
    app: hermes
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8642
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes
  namespace: hermes
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: hermes.fog.chalko.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
               service:
                 name: hermes
                 port:
                   number: 80
  tls:
    - hosts:
        - hermes.fog.chalko.com
      secretName: hermes-tls
