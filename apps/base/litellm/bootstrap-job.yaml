apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-bootstrap
  namespace: litellm
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:latest
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
      volumes:
        - name: script-volume
          configMap:
            name: litellm-bootstrap-script
            defaultMode: 0744
