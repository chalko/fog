apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: gemini-flash
        litellm_params:
          model: gemini/gemini-3.5-flash
          api_key: "os.environ/GEMINI_API_KEY"
      - model_name: gemini-pro
        litellm_params:
          model: gemini/gemini-3.5-pro
          api_key: "os.environ/GEMINI_API_KEY"
      - model_name: grok-2
        litellm_params:
          model: xai/grok-2
          api_key: "os.environ/XAI_API_KEY"
      - model_name: grok-beta
        litellm_params:
          model: xai/grok-beta
          api_key: "os.environ/XAI_API_KEY"
      - model_name: llama3.2
        litellm_params:
          model: ollama/llama3.2:1b
          api_base: https://ollama.fog.chalko.com
    
    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"
