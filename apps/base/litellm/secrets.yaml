apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secrets
  namespace: litellm
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: litellm-secrets
    creationPolicy: Owner
  data:
    - secretKey: gemini-api-key
      remoteRef:
        key: secret/data/app/litellm
        property: gemini_api_key
    - secretKey: master-key
      remoteRef:
        key: secret/data/app/litellm
        property: master_key
