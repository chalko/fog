apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gitea-charts
  namespace: gitea
spec:
  interval: 1h
  url: https://dl.gitea.com/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 10m
  chart:
    spec:
      chart: gitea
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
  values:
    extraVolumes:
      - name: gitea-ssh-keys
        secret:
          secretName: gitea-secrets
          defaultMode: 256
          items:
            - key: ssh_host_rsa_key
              path: ssh_host_rsa_key
    extraVolumeMounts:
      - name: gitea-ssh-keys
        mountPath: /etc/gitea-ssh/
        readOnly: true
    gitea:
      admin:
        username: "admin"
        passwordKey: "password"
        existingSecret: "gitea-secrets"
      config:
        APP_NAME: "Chalko Home Lab Git Service"
        security:
          INSTALL_LOCK: true
        server:
          SSH_DOMAIN: "gitea.fog.chalko.com"
          SSH_PORT: 30222
          SSH_KEY_PATH: "/etc/gitea-ssh/ssh_host_rsa_key"
    deployment:
      env:
        - name: GITEA__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: gitea-secrets
              key: db-password
    postgresql:
      enabled: true
      auth:
        database: "gitea"
        username: "gitea"
        existingSecret: "gitea-secrets"
        secretKeys:
          adminPasswordKey: "db-password"
          userPasswordKey: "db-password"
      primary:
        persistence:
          enabled: true
          size: "8Gi"
          storageClass: "local-path"
    postgresql-ha:
      enabled: false
    persistence:
      enabled: true
      size: "16Gi"
      storageClass: "local-path"
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - host: gitea.fog.chalko.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - gitea.fog.chalko.com
          secretName: gitea-tls
    giteaProbes:
      liveness:
        httpGet:
          path: /api/healthz
          port: http
        initialDelaySeconds: 200
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 10
      readiness:
        httpGet:
          path: /api/healthz
          port: http
        initialDelaySeconds: 200
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
    service:
      ssh:
        type: NodePort
        nodePort: 30222
