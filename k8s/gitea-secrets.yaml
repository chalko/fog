apiVersion: v1
kind: Namespace
metadata:
  name: gitea
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: gitea
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-secrets
  namespace: gitea
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: secret/data/app/gitea
        property: db_password
    - secretKey: password
      remoteRef:
        key: secret/data/app/gitea
        property: admin_password
    - secretKey: username
      remoteRef:
        key: secret/data/app/gitea
        property: username
